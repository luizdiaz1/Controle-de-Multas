<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Multas</title>
<style>
:root{
  --bg:#f7f9fc;--panel:#ffffff;--panel2:#f1f5f9;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;
  --blue:#2563eb;--cyan:#06b6d4;--green:#10b981;--amber:#f59e0b;--red:#ef4444;--violet:#8b5cf6;
  --shadow:0 14px 40px rgba(15,23,42,.08);--radius:18px;--radius2:12px;
  --font:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
*{box-sizing:border-box} body{margin:0;background:radial-gradient(circle at top left,#e0f2fe 0,#f7f9fc 34%,#f8fafc 100%);font-family:var(--font);color:var(--text);min-height:100vh}
button,input,select,textarea{font:inherit} button{cursor:pointer}
.app{max-width:1240px;margin:0 auto;padding:22px}
.top{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px}
.brand{display:flex;align-items:center;gap:12px}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--cyan));box-shadow:0 10px 25px rgba(37,99,235,.22);display:grid;place-items:center;color:white;font-weight:900}.brand h1{font-size:22px;letter-spacing:-.04em;margin:0}.brand small{display:block;color:var(--muted);margin-top:2px;font-size:12px}.top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;padding:10px 13px;font-weight:700;font-size:13px;display:inline-flex;align-items:center;gap:8px;box-shadow:0 4px 14px rgba(15,23,42,.04)}.btn:hover{border-color:#cbd5e1;transform:translateY(-1px)}.btn.primary{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:white;border-color:transparent}.btn.ghost{box-shadow:none;background:transparent}
.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px}.stat{background:rgba(255,255,255,.82);backdrop-filter:blur(14px);border:1px solid rgba(226,232,240,.9);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow)}.stat span{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900}.stat strong{display:block;font-size:23px;letter-spacing:-.04em;margin-top:5px}.stat em{font-style:normal;font-size:12px;color:var(--muted)}
.shell{display:grid;grid-template-columns:270px 1fr;gap:14px}.side{background:rgba(255,255,255,.8);border:1px solid rgba(226,232,240,.95);border-radius:var(--radius);padding:14px;box-shadow:var(--shadow);height:max-content;position:sticky;top:16px}.side-title{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:900;margin:2px 0 10px}.nav{display:grid;gap:7px;margin-bottom:14px}.nav button{border:0;text-align:left;background:transparent;border-radius:12px;padding:10px 11px;color:var(--muted);font-weight:800;display:flex;justify-content:space-between;gap:10px}.nav button:hover{background:#f1f5f9;color:var(--text)}.nav button.active{background:#eaf2ff;color:#1d4ed8}.pillnum{font-size:11px;background:white;border:1px solid var(--line);border-radius:999px;padding:2px 7px;color:inherit}.mini-list{display:grid;gap:9px}.mini-card{border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:10px}.mini-card b{font-size:12px}.mini-card p{margin:4px 0 0;color:var(--muted);font-size:11px;line-height:1.35}.dot{width:8px;height:8px;border-radius:999px;display:inline-block;margin-right:6px;background:var(--blue)}
.main{min-width:0}.filters{background:rgba(255,255,255,.86);border:1px solid rgba(226,232,240,.95);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow);margin-bottom:12px}.search{display:flex;gap:10px;margin-bottom:10px}.search input{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:14px;padding:12px 14px;outline:none;font-weight:650}.search input:focus{border-color:#93c5fd;background:white;box-shadow:0 0 0 4px rgba(37,99,235,.08)}.filter-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px}select{width:100%;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:12px;padding:10px 11px;outline:none;font-weight:750;font-size:13px;min-width:0}select:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.08)}
.list-head{display:flex;align-items:end;justify-content:space-between;gap:10px;margin:10px 2px 10px}.list-head h2{margin:0;font-size:18px;letter-spacing:-.03em}.list-head small{color:var(--muted);font-weight:650}.cards{display:grid;gap:10px}.ticket{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:13px;box-shadow:0 8px 24px rgba(15,23,42,.05);display:grid;grid-template-columns:110px minmax(0,1.3fr) minmax(150px,.8fr) minmax(140px,.6fr) auto;gap:12px;align-items:center}.ticket:hover{border-color:#bfdbfe;box-shadow:0 10px 28px rgba(37,99,235,.09)}.plate{font-weight:950;letter-spacing:.08em;background:#0f172a;color:white;border-radius:12px;padding:9px 10px;text-align:center;box-shadow:inset 0 -2px 0 rgba(255,255,255,.12)}.muted{color:var(--muted)}.driver{min-width:0}.driver b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.driver small,.place small,.money small{display:block;color:var(--muted);font-size:12px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.inf{font-size:12px;color:#334155;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.money{text-align:right}.money b{font-size:15px}.tag{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 9px;font-size:11px;font-weight:950;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}.tag.aguardando_aceite{background:#eff6ff;color:#1d4ed8}.tag.pago{background:#ecfdf5;color:#047857}.tag.aceito{background:#f0fdf4;color:#15803d}.tag.sem_necessidade{background:#f8fafc;color:#475569}.tag.recorrida{background:#f5f3ff;color:#6d28d9}.tag.demitido{background:#fff7ed;color:#c2410c}.tag.sus{background:#fef2f2;color:#b91c1c}.actions{display:flex;gap:6px;justify-content:flex-end}.ico{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:11px;display:grid;place-items:center;font-weight:900;color:var(--muted)}.ico:hover{color:var(--blue);border-color:#bfdbfe;background:#eff6ff}.empty{border:1px dashed #cbd5e1;background:#fff;border-radius:18px;padding:34px;text-align:center;color:var(--muted)}
.drawer{position:fixed;inset:0;background:rgba(15,23,42,.38);display:none;align-items:center;justify-content:center;padding:18px;z-index:10}.drawer.open{display:flex}.modal{background:white;border-radius:22px;width:min(760px,100%);max-height:90vh;overflow:auto;box-shadow:0 30px 90px rgba(15,23,42,.25);border:1px solid var(--line);padding:18px}.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.modal-head h3{margin:0;font-size:18px}.form{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field.full{grid-column:1/-1}.field label{font-size:12px;color:var(--muted);font-weight:900;display:block;margin-bottom:5px}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);background:#f8fafc;border-radius:12px;padding:10px;outline:none}.field textarea{min-height:74px;resize:vertical}.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:14px}
@media(max-width:1020px){.stats{grid-template-columns:repeat(3,1fr)}.shell{grid-template-columns:1fr}.side{position:static}.ticket{grid-template-columns:95px minmax(0,1fr) auto}.place,.money{grid-column:2/-1;text-align:left}.actions{grid-column:1/-1;justify-content:flex-start}.filter-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.app{padding:14px}.top{align-items:flex-start}.top-actions{width:100%}.top-actions .btn{flex:1;justify-content:center}.stats{grid-template-columns:repeat(2,1fr)}.stat strong{font-size:20px}.filter-grid{grid-template-columns:1fr 1fr}.search{flex-direction:column}.ticket{grid-template-columns:1fr;gap:8px}.plate{width:max-content}.place,.money,.actions{grid-column:auto;text-align:left}.driver b{white-space:normal}.inf{white-space:normal}.form{grid-template-columns:1fr}.field.full{grid-column:auto}.brand h1{font-size:20px}}
@media(max-width:420px){.stats{grid-template-columns:1fr}.filter-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand"><div class="logo">⚡</div><div><h1>Controle de Multas</h1><small id="baseInfo">Base da planilha</small></div></div>
    <div class="top-actions"><button class="btn" onclick="resetFilters()">Limpar</button><button class="btn" onclick="exportCSV()">Exportar CSV</button><button class="btn primary" onclick="openModal()">+ Nova multa</button></div>
  </header>
  <section class="stats" id="stats"></section>
  <section class="shell">
    <aside class="side">
      <div class="side-title">Atalhos</div>
      <div class="nav" id="statusNav"></div>
      <div class="side-title">Prioridade</div>
      <div class="mini-list" id="priorityList"></div>
    </aside>
    <main class="main">
      <div class="filters">
        <div class="search"><input id="q" placeholder="Buscar por placa, motorista, auto, local ou infração..." oninput="render()"></div>
        <div class="filter-grid">
          <select id="month" onchange="render()"><option value="">Todos os meses</option></select>
          <select id="driver" onchange="render()"><option value="">Todos os motoristas</option></select>
          <select id="city" onchange="render()"><option value="">Todos os municípios</option></select>
          <select id="paid" onchange="render()"><option value="">Pagamento</option><option value="OK">Pago OK</option><option value="PENDENTE">Não pago/pendente</option></select>
          <select id="sort" onchange="render()"><option value="data_desc">Mais recentes</option><option value="prazo_aceite">Prazo aceite</option><option value="valor_desc">Maior valor</option><option value="motorista">Motorista A-Z</option><option value="carro">Placa A-Z</option></select>
        </div>
      </div>
      <div class="list-head"><div><h2 id="listTitle">Todas as multas</h2><small id="countLabel"></small></div><small id="monthHint"></small></div>
      <div class="cards" id="cards"></div>
    </main>
  </section>
</div>
<div class="drawer" id="drawer"><div class="modal">
  <div class="modal-head"><h3 id="modalTitle">Nova multa</h3><button class="ico" onclick="closeModal()">×</button></div>
  <div class="form">
    <div class="field"><label>Placa</label><input id="fCarro" style="text-transform:uppercase"></div>
    <div class="field"><label>Motorista</label><input id="fMotorista"></div>
    <div class="field"><label>Data da multa</label><input id="fData" type="date"></div>
    <div class="field"><label>Hora</label><input id="fHora" type="time"></div>
    <div class="field"><label>Município</label><input id="fMunicipio"></div>
    <div class="field"><label>Auto de infração</label><input id="fAuto"></div>
    <div class="field"><label>Valor</label><input id="fValor" type="number" step="0.01"></div>
    <div class="field"><label>Envio RCA</label><input id="fRCA" type="date"></div>
    <div class="field"><label>Prazo aceite SENATRAN</label><input id="fPrazoAceite" type="date"></div>
    <div class="field"><label>Assinado</label><select id="fAssinado"><option value="">Pendente</option><option>OK</option><option>S/ NESSECIDADE</option></select></div>
    <div class="field"><label>Pago</label><select id="fPago"><option value="">Pendente</option><option>OK</option></select></div>
    <div class="field full"><label>Local</label><input id="fLocal"></div>
    <div class="field full"><label>Infração</label><input id="fInfracao"></div>
    <div class="field full"><label>Informações adicionais</label><textarea id="fObs"></textarea></div>
  </div>
  <div class="modal-actions"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveRecord()">Salvar</button></div>
</div></div>

const IMPORT_MAX_MONTH = '2026-05';
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
let records = (JSON.parse(localStorage.getItem('multasCleanTech')||'null') || SOURCE_DATA).map(r=>({...r,prazoAceite:r.prazoAceite||''}));
let currentStatus = 'todos';
let editingId = null;
const BRL = v => Number(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const fmtDate = d => /^\d{4}-\d{2}-\d{2}$/.test(d||'') ? d.split('-').reverse().join('/') : '-';
const ym = d => /^\d{4}-\d{2}-\d{2}$/.test(d||'') ? d.slice(0,7) : '';
const monthLabel = v => { if(!/^\d{4}-\d{2}$/.test(v||'')) return 'Todos os meses'; const [y,m]=v.split('-'); return `${MONTHS[+m-1]} / ${y}`; };
const clean = s => String(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase();
const validMonth = m => /^\d{4}-\d{2}$/.test(m) && m <= IMPORT_MAX_MONTH;
const statusInfo = {
  todos:['Todos','#64748b'], aguardando_aceite:['Aguardando aceite','#2563eb'], pago:['Pagas','#10b981'], aceito:['Aceitas','#16a34a'], recorrida:['Recorridas','#8b5cf6'], sem_necessidade:['Sem necessidade','#64748b'], demitido:['Demitido','#f59e0b']
};
function inferStatus(r){
  const ass=String(r.assinado||'').toUpperCase().trim();
  const pg=String(r.pago||'').toUpperCase().trim();
  const obs=String(r.obs||'').toUpperCase();
  const t=[r.assinado,r.obs,r.pago,r.envioRCA,r.dp].join(' ').toUpperCase();
  if(t.includes('RECORR')) return 'recorrida';
  if(t.includes('DEMIT')) return 'demitido';
  if(pg==='OK') return 'pago';
  // Se a observação diz que ainda está aguardando aceite do real infrator,
  // ela deve aparecer como pendente mesmo que a coluna Assinado esteja marcada como OK.
  if(obs.includes('AGUARD') && obs.includes('ACEITE')) return 'aguardando_aceite';
  if(ass==='OK') return 'aceito';
  if(t.includes('S/') || t.includes('SEM COBRAN') || t.includes('S/N')) return 'sem_necessidade';
  return 'aguardando_aceite';
}
function persist(){ localStorage.setItem('multasCleanTech', JSON.stringify(records)); }
function setupFilters(){
  const months=[...new Set(records.map(r=>ym(r.data)).filter(validMonth))].sort();
  const drivers=[...new Set(records.map(r=>r.motorista).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));

  month.innerHTML='<option value="">Todos os meses</option>'+months.map(m=>`<option value="${m}">${monthLabel(m)}</option>`).join('');
  driver.innerHTML='<option value="">Todos os motoristas</option>'+drivers.map(v=>`<option>${escapeHtml(v)}</option>`).join('');

function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function filtered(){
  let arr=records.map(r=>({...r,status:inferStatus(r)}));
  const query=clean(q.value), m=month.value, d=driver.value, c=city.value, p=paid.value;
  if(currentStatus!=='todos') arr=arr.filter(r=>r.status===currentStatus);
  if(m) arr=arr.filter(r=>ym(r.data)===m);
  if(d) arr=arr.filter(r=>r.motorista===d);
  if(c) arr=arr.filter(r=>r.municipio===c);
  if(p==='OK') arr=arr.filter(r=>String(r.pago||'').toUpperCase()==='OK');
  if(p==='PENDENTE') arr=arr.filter(r=>String(r.pago||'').toUpperCase()!=='OK');
  if(query) arr=arr.filter(r=>clean([r.carro,r.motorista,r.auto,r.local,r.municipio,r.infracao,r.obs,r.prazoAceite].join(' ')).includes(query));
  const s=sort.value;
  arr.sort((a,b)=>{
    if(s==='prazo_aceite') return String(a.prazoAceite||'9999-99-99').localeCompare(String(b.prazoAceite||'9999-99-99')) || String(b.data||'').localeCompare(String(a.data||''));
    if(s==='valor_desc') return (b.valor||0)-(a.valor||0);
    if(s==='motorista') return String(a.motorista).localeCompare(String(b.motorista),'pt-BR');
    if(s==='carro') return String(a.carro).localeCompare(String(b.carro),'pt-BR');
    return String(b.data||'').localeCompare(String(a.data||''));
  });
  return arr;
}
function renderStats(arrAll){

}
function renderNav(){
  const arr=records.map(r=>({...r,status:inferStatus(r)})).filter(r=>validMonth(ym(r.data)));
  const keys=['todos','aguardando_aceite','pago','aceito','recorrida','sem_necessidade','demitido'];
  statusNav.innerHTML=keys.map(k=>{
    const count=k==='todos'?arr.length:arr.filter(r=>r.status===k).length;
    return `<button class="${currentStatus===k?'active':''}" onclick="setStatus('${k}')"><span>${statusInfo[k][0]}</span><span class="pillnum">${count}</span></button>`;
  }).join('');
}
function prazoAceiteTexto(r){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(r.prazoAceite||'')) return 'Prazo aceite: não informado';
  const hoje=new Date(); hoje.setHours(0,0,0,0);
  const dt=new Date(r.prazoAceite+'T00:00:00');
  const diff=Math.round((dt-hoje)/86400000);
  if(diff<0) return `Prazo aceite: ${fmtDate(r.prazoAceite)} • vencido`;
  if(diff===0) return `Prazo aceite: ${fmtDate(r.prazoAceite)} • vence hoje`;
  if(diff===1) return `Prazo aceite: ${fmtDate(r.prazoAceite)} • vence amanhã`;
  return `Prazo aceite: ${fmtDate(r.prazoAceite)} • ${diff} dias`;
}
function renderPriority(){
  const pr=records.map(r=>({...r,status:inferStatus(r)})).filter(r=>r.status==='aguardando_aceite' && validMonth(ym(r.data))).sort((a,b)=>String(a.prazoAceite||'9999-99-99').localeCompare(String(b.prazoAceite||'9999-99-99')) || String(b.data).localeCompare(String(a.data))).slice(0,6);
  priorityList.innerHTML=pr.length?pr.map(r=>`<div class="mini-card"><b><span class="dot"></span>${escapeHtml(r.carro)} • ${fmtDate(r.data)}</b><p>${escapeHtml(r.motorista)}<br>${prazoAceiteTexto(r)}</p></div>`).join(''):'<div class="mini-card"><b>Nenhuma prioridade</b><p>Não há multas aguardando aceite nos meses válidos.</p></div>';
}
function renderCards(arr){
  countLabel.textContent = `${arr.length} registro${arr.length===1?'':'s'} encontrado${arr.length===1?'':'s'}`;
  listTitle.textContent = statusInfo[currentStatus][0]==='Todos'?'Todas as multas':statusInfo[currentStatus][0];
  monthHint.textContent = month.value ? monthLabel(month.value) : 'Meses válidos até Maio / 2026';
  if(!arr.length){cards.innerHTML='<div class="empty">Nenhuma multa encontrada com esses filtros.</div>';return;}
  cards.innerHTML=arr.map(r=>{
    const sus = r.dataSuspeita || !validMonth(ym(r.data));
    const tag = sus ? '<span class="tag sus">Revisar data</span>' : `<span class="tag ${r.status}">${statusInfo[r.status]?.[0]||r.status}</span>`;
    return `<article class="ticket">
      <div class="plate">${escapeHtml(r.carro)}</div>
      <div class="driver"><b>${escapeHtml(r.motorista||'S/N')}</b><small>${fmtDate(r.data)}${r.hora?' • '+r.hora:''} • Auto ${escapeHtml(r.auto||'-')}</small><div class="inf">${escapeHtml(r.infracao||'-')}</div></div>
      <div class="place"><b>${escapeHtml(r.municipio||'-')}</b><small>${escapeHtml(r.local||'-')}</small></div>
      <div class="money"><b>${BRL(r.valor)}</b><small>Envio RCA: ${fmtDate(r.envioRCA)}</small><small>${prazoAceiteTexto(r)}</small>${tag}</div>
      <div class="actions"><button class="ico" title="Editar" onclick="openModal(${r.id})">✎</button><button class="ico" title="Excluir" onclick="removeRecord(${r.id})">×</button></div>
    </article>`;
  }).join('');
}
function render(){
  const all=records.map(r=>({...r,status:inferStatus(r)}));
  renderStats(all); renderNav(); renderPriority(); renderCards(filtered());
}
function setStatus(s){ currentStatus=s; render(); }
function resetFilters(){ q.value=''; month.value=''; driver.value=''; city.value=''; paid.value=''; sort.value='data_desc'; currentStatus='todos'; render(); }
function openModal(id=null){
  editingId=id; const r=id?records.find(x=>x.id===id):{};
  modalTitle.textContent=id?'Editar multa':'Nova multa';
  fCarro.value=r?.carro||''; fMotorista.value=r?.motorista||''; fData.value=r?.data||''; fHora.value=r?.hora||''; fMunicipio.value=r?.municipio||''; fAuto.value=r?.auto||''; fValor.value=r?.valor||''; fRCA.value=/^\d{4}-\d{2}-\d{2}$/.test(r?.envioRCA||'')?r.envioRCA:''; fPrazoAceite.value=/^\d{4}-\d{2}-\d{2}$/.test(r?.prazoAceite||'')?r.prazoAceite:''; fAssinado.value=r?.assinado||''; fPago.value=r?.pago||''; fLocal.value=r?.local||''; fInfracao.value=r?.infracao||''; fObs.value=r?.obs||'';
  drawer.classList.add('open');
}
function closeModal(){drawer.classList.remove('open');editingId=null;}
function saveRecord(){
  const base={id:editingId||Date.now(),linha:'manual',carro:fCarro.value.trim().toUpperCase(),motorista:fMotorista.value.trim()||'S/N',data:fData.value,hora:fHora.value,municipio:fMunicipio.value.trim(),auto:fAuto.value.trim(),valor:+fValor.value||0,envioRCA:fRCA.value,prazoAceite:fPrazoAceite.value,assinado:fAssinado.value,pago:fPago.value,local:fLocal.value.trim(),infracao:fInfracao.value.trim(),obs:fObs.value.trim(),dp:'',dataSuspeita:false};
  if(!base.carro || !base.data){alert('Preencha pelo menos placa e data.');return;}
  if(editingId){const i=records.findIndex(r=>r.id===editingId); if(i>=0) records[i]={...records[i],...base};}
  else records.unshift(base);
  persist(); setupFilters(); closeModal(); render();
}
function removeRecord(id){ if(confirm('Excluir esta multa?')){records=records.filter(r=>r.id!==id);persist();setupFilters();render();} }
function exportCSV(){
  const rows=filtered(); const head=['Placa','Data','Hora','Local','Município','Infração','Auto','Motorista','Valor','Assinado','Pago','Envio RCA','Prazo aceite','DP','Status','Observações'];
  const csv=[head,...rows.map(r=>[r.carro,r.data,r.hora,r.local,r.municipio,r.infracao,r.auto,r.motorista,r.valor,r.assinado,r.pago,r.envioRCA,r.prazoAceite,r.dp,statusInfo[r.status]?.[0]||r.status,r.obs])].map(row=>row.map(c=>'"'+String(c??'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='controle_multas.csv'; a.click(); URL.revokeObjectURL(a.href);
}
setupFilters(); render();
</script>
</body>
