<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Multas</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#fff;--bg2:#f4f4f0;--bg3:#efefeb;
  --tx:#1a1a18;--tx2:#6b6b67;
  --bd:rgba(0,0,0,0.12);--bd2:rgba(0,0,0,0.22);
  --r:8px;--rl:12px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fm:'SF Mono','Fira Code',monospace;
}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh;}
.app{max-width:1300px;margin:0 auto;padding:2rem 1.5rem;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.75rem;flex-wrap:wrap;gap:1rem;}
.ht{font-size:22px;font-weight:600;display:flex;align-items:center;gap:10px;}
.hs{font-size:13px;color:var(--tx2);margin-top:3px;}
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:1.5rem;}
.sc{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--r);padding:15px 17px;}
.sl{font-size:11px;color:var(--tx2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em;}
.sv{font-size:22px;font-weight:600;}
.sv.d{color:#A32D2D;}.sv.w{color:#854F0B;}.sv.s{color:#3B6D11;}.sv.sm{font-size:15px;}
.ab{background:#FAEEDA;border:0.5px solid #EF9F27;border-radius:var(--r);padding:13px 17px;margin-bottom:1.5rem;display:flex;align-items:flex-start;gap:12px;}
.ai{font-size:20px;color:#854F0B;margin-top:1px;flex-shrink:0;}
.at{font-weight:600;margin-bottom:5px;font-size:13px;color:#412402;}
.ax{font-size:13px;color:#633806;line-height:1.7;}
.tabs{display:flex;gap:2px;margin-bottom:1rem;border-bottom:1px solid var(--bd);flex-wrap:wrap;}
.tab{font-size:13px;padding:8px 14px;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;color:var(--tx2);font-family:var(--f);}
.tab.active{color:var(--tx);border-bottom-color:var(--tx);font-weight:600;}
.tab:hover:not(.active){background:var(--bg2);border-radius:6px 6px 0 0;}
.tb{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.tb input,.tb select{padding:8px 11px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;font-family:var(--f);background:var(--bg);color:var(--tx);}
.tb input{flex:1;min-width:160px;}
.tb input:focus,.tb select:focus{outline:none;border-color:#378ADD;}
.abtn{background:var(--tx);color:var(--bg);border:none;padding:8px 16px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:6px;font-weight:500;white-space:nowrap;}
.abtn:hover{opacity:.85;}
.sbtn{background:var(--bg);color:var(--tx);border:0.5px solid var(--bd2);padding:8px 13px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;}
.sbtn:hover{background:var(--bg2);}
.tw{background:var(--bg);border:0.5px solid var(--bd);border-radius:var(--rl);overflow:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:1000px;}
thead{background:var(--bg2);}
th{padding:9px 11px;text-align:left;font-weight:600;color:var(--tx2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;border-bottom:0.5px solid var(--bd);white-space:nowrap;}
td{padding:9px 11px;border-bottom:0.5px solid var(--bd);color:var(--tx);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bw{background:#E6F1FB;color:#185FA5;}
.ba{background:#EAF3DE;color:#3B6D11;}
.bp{background:#E1F5EE;color:#0F6E56;}
.bo{background:#FCEBEB;color:#A32D2D;}
.be{background:#EEEDFE;color:#534AB7;}
.dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dok{color:var(--tx2);font-size:12px;}
.dwn{color:#854F0B;font-weight:600;font-size:12px;}
.dur{color:#A32D2D;font-weight:600;font-size:12px;}
.actions{display:flex;gap:3px;}
.ib{background:none;border:none;cursor:pointer;padding:4px 5px;color:var(--tx2);border-radius:5px;font-size:15px;display:flex;align-items:center;}
.ib:hover{background:var(--bg2);color:var(--tx);}
.pt{font-family:var(--fm);background:var(--bg2);padding:2px 6px;border-radius:4px;font-size:11px;letter-spacing:.06em;font-weight:700;}
.ic{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.empty{text-align:center;padding:3rem;color:var(--tx2);font-size:14px;}
.empty i{font-size:36px;display:block;margin-bottom:10px;opacity:.4;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;}
.mo.open{display:flex;}
.md{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--bd);padding:1.75rem;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.18);}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.mt{font-size:17px;font-weight:600;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.ff{grid-column:1/-1;}
.fg label{display:block;font-size:12px;color:var(--tx2);margin-bottom:4px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:8px 10px;border:0.5px solid var(--bd2);border-radius:var(--r);font-size:13px;font-family:var(--f);background:var(--bg);color:var(--tx);}
.fg textarea{resize:vertical;min-height:55px;}
.fg input:focus,.fg select:focus,.fg textarea:focus{outline:none;border-color:#378ADD;}
.fa{display:flex;justify-content:flex-end;gap:10px;margin-top:1.5rem;}
.bcl{background:none;border:0.5px solid var(--bd2);padding:8px 17px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;color:var(--tx);}
.bsv{background:var(--tx);color:var(--bg);border:none;padding:8px 19px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;font-weight:500;}
@media(max-width:640px){.sg{grid-template-columns:1fr 1fr;}.fg{grid-template-columns:1fr;}.ff{grid-column:1;}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <div class="ht"><i class="ti ti-license"></i> Controle de Multas</div>
      <div class="hs">Gestão de autuações e prazos</div>
    </div>
    <button class="abtn" onclick="openModal()"><i class="ti ti-plus"></i> Nova multa</button>
  </div>
  <div class="sg" id="stats"></div>
  <div id="abox"></div>
  <div class="tabs">
    <button class="tab active" onclick="setTab('todas',this)">Todas</button>
    <button class="tab" onclick="setTab('aguardando_motorista',this)">Aguardando motorista</button>
    <button class="tab" onclick="setTab('em_analise',this)">Em análise</button>
    <button class="tab" onclick="setTab('aceito_cdt',this)">Aceito na CDT</button>
    <button class="tab" onclick="setTab('vencido',this)">Vencidas</button>
    <button class="tab" onclick="setTab('pago',this)">Pagas</button>
  </div>
  <div class="tb">
    <input type="text" placeholder="Buscar por placa, motorista ou auto..." id="si" oninput="render()"/>
    <select onchange="render()" id="fo"><option value="">Todos os órgãos</option></select>
    <select onchange="render()" id="fm"><option value="">Todos os motoristas</option></select>
    <select onchange="render()" id="fmes"><option value="">Todos os meses</option></select>
    <button class="sbtn" onclick="clearFilters()"><i class="ti ti-filter-off"></i> Limpar filtros</button>
    <button class="sbtn" onclick="exportCSV()"><i class="ti ti-download"></i> Exportar CSV</button>
  </div>
  <div class="tw">
    <table>
      <thead><tr>
        <th>Placa</th><th>Motorista</th><th>Órgão</th><th>Auto</th><th>Infração</th>
        <th>Valor</th><th>Data</th><th>Prazo RCA</th><th>Status</th><th>Observações</th><th></th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>
<div class="mo" id="modal">
  <div class="md">
    <div class="mh"><span class="mt" id="mtitle">Nova multa</span><button class="ib" onclick="closeModal()"><i class="ti ti-x"></i></button></div>
    <div class="fg">
      <div><label>Placa *</label><input type="text" id="fp" placeholder="ABC-1234" maxlength="10" style="text-transform:uppercase"/></div>
      <div><label>Motorista *</label><input type="text" id="fm2" placeholder="Nome completo"/></div>
      <div><label>Órgão *</label><input type="text" id="fo2" placeholder="PRF, DETRAN-RJ, CET-RIO..."/></div>
      <div><label>Auto de infração</label><input type="text" id="fau" placeholder="Nº do auto"/></div>
      <div class="ff"><label>Local</label><input type="text" id="flo" placeholder="Local - Município"/></div>
      <div class="ff"><label>Infração</label><input type="text" id="fin" placeholder="Descrição da infração"/></div>
      <div><label>Valor (R$) *</label><input type="number" id="fv" placeholder="0.00" min="0" step="0.01"/></div>
      <div><label>Status</label>
        <select id="fst">
          <option value="aguardando_motorista">Aguardando motorista</option>
          <option value="aceito_cdt">Aceito na CDT</option>
          <option value="pago">Pago</option>
          <option value="vencido">Vencido</option>
          <option value="em_analise">Em análise</option>
        </select>
      </div>
      <div><label>Data da infração</label><input type="date" id="fdt"/></div>
      <div><label>Prazo RCA</label><input type="date" id="fpr"/></div>
      <div class="ff"><label>Observações</label><textarea id="fob" placeholder="Informações adicionais..."></textarea></div>
    </div>
    <div class="fa">
      <button class="bcl" onclick="closeModal()">Cancelar</button>
      <button class="bsv" onclick="saveMulta()">Salvar</button>
    </div>
  </div>
</div>

const today=new Date();today.setHours(0,0,0,0);
function df(ds){if(!ds)return null;const d=new Date(ds);d.setHours(0,0,0,0);return Math.round((d-today)/86400000);}
function fd(ds){if(!ds)return'-';const[y,m,d]=ds.split('-');return d+'/'+m+'/'+y;}
function fv(v){return'R$ '+Number(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});}
const ML=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
function ym(ds){return /^\d{4}-\d{2}-\d{2}$/.test(ds||'')?ds.slice(0,7):'';}
function ml(v){if(!/^\d{4}-\d{2}$/.test(v||''))return v||'';const[y,m]=v.split('-');return ML[Number(m)-1]+' / '+y;}
const SM={
  aguardando_motorista:['bw','#378ADD','Aguardando motorista'],
  aceito_cdt:['ba','#639922','Aceito na CDT'],
  pago:['bp','#1D9E75','Pago'],
  vencido:['bo','#E24B4A','Vencido'],
  em_analise:['be','#7F77DD','Em análise'],
};
let multas=SOURCE.map((m,i)=>({...m,id:i+1}));
let nid=multas.length+1,ctab='todas',eid=null;
function sv(){try{localStorage.setItem('mc',JSON.stringify(multas));}catch(e){}}
function lv(){try{const d=localStorage.getItem('mc');if(d){multas=JSON.parse(d);nid=Math.max(...multas.map(m=>m.id))+1;}}catch(e){}}
function gf(){
  const q=document.getElementById('si').value.toLowerCase();
  const o=document.getElementById('fo').value;
  const m=document.getElementById('fm').value;
  const mes=document.getElementById('fmes').value;
  return multas.filter(x=>{
    if(ctab!=='todas'&&x.status!==ctab)return false;
    if(o&&x.orgao!==o)return false;
    if(m&&x.motorista!==m)return false;
    if(mes&&ym(x.vencimento)!==mes)return false;
    if(q&&!x.placa.toLowerCase().includes(q)&&!(x.motorista||'').toLowerCase().includes(q)&&!(x.auto||'').toLowerCase().includes(q))return false;
    return true;
  });
}
function rs(){
  const v=multas.filter(m=>m.status==='vencido').length;
  const u=multas.filter(m=>{const d=df(m.prazo);return d!==null&&d>=0&&d<=5&&m.status!=='pago'&&m.status!=='vencido';}).length;
  const p=multas.filter(m=>m.status==='pago').length;
  const ab=multas.filter(m=>m.status!=='pago').reduce((s,m)=>s+m.valor,0);
  document.getElementById('stats').innerHTML=`
    <div class="sc"><div class="sl">Total</div><div class="sv">${multas.length}</div></div>
    <div class="sc"><div class="sl">Valor em aberto</div><div class="sv sm">${fv(ab)}</div></div>
    <div class="sc"><div class="sl">Prazo próximo</div><div class="sv ${u>0?'d':''}">${u}</div></div>
    <div class="sc"><div class="sl">Vencidas</div><div class="sv ${v>0?'w':''}">${v}</div></div>
    <div class="sc"><div class="sl">Pagas</div><div class="sv s">${p}</div></div>
  `;
}
function ra(){
  const u=multas.filter(m=>{const d=df(m.prazo);return d!==null&&d>=0&&d<=5&&m.status!=='pago'&&m.status!=='vencido';});
  const box=document.getElementById('abox');
  if(!u.length){box.innerHTML='';return;}
  const it=u.map(m=>{const d=df(m.prazo);const l=d===0?'vence hoje':`vence em ${d}d`;return`<b>${m.placa}</b> (${m.motorista||'—'}) — prazo RCA <b>${l}</b>`;}).join('<br>');
  box.innerHTML=`<div class="ab"><i class="ti ti-alert-triangle ai"></i><div><div class="at"><i class="ti ti-bell" style="font-size:13px;vertical-align:-1px;margin-right:4px"></i>Atenção: ${u.length} multa${u.length>1?'s':''} com prazo próximo (≤5 dias)</div><div class="ax">${it}</div></div></div>`;
}
function rf(){
  const og=[...new Set(multas.map(m=>m.orgao).filter(Boolean))].sort();
  const mt=[...new Set(multas.map(m=>m.motorista).filter(Boolean))].sort();
  const ms=[...new Set(multas.map(m=>ym(m.vencimento)).filter(Boolean))].sort();
  const so=document.getElementById('fo'),co=so.value;
  so.innerHTML='<option value="">Todos os órgãos</option>'+og.map(o=>`<option${o===co?' selected':''} value="${o}">${o}</option>`).join('');
  const sm=document.getElementById('fm'),cm=sm.value;
  sm.innerHTML='<option value="">Todos os motoristas</option>'+mt.map(m=>`<option${m===cm?' selected':''} value="${m}">${m}</option>`).join('');
  const sf=document.getElementById('fmes'),cf=sf.value;
  sf.innerHTML='<option value="">Todos os meses</option>'+ms.map(m=>`<option${m===cf?' selected':''} value="${m}">${ml(m)}</option>`).join('');
}
function clearFilters(){
  document.getElementById('si').value='';
  document.getElementById('fo').value='';
  document.getElementById('fm').value='';
  document.getElementById('fmes').value='';
  render();
}
function dc(ds,st){
  if(st==='pago'||st==='vencido')return'dok';
  const d=df(ds);if(d===null||d<0)return'dok';
  if(d<=2)return'dur';if(d<=5)return'dwn';return'dok';
}
function dl(ds,st){
  if(!ds)return'-';const d=df(ds);const b=fd(ds);
  if(st==='pago'||st==='vencido')return b;
  if(d===0)return b+' <small>(hoje)</small>';
  if(d===1)return b+' <small>(amanhã)</small>';
  if(d>0&&d<=5)return b+` <small>(${d}d)</small>`;
  return b;
}
function render(){
  rs();ra();rf();
  const data=gf();
  const tb=document.getElementById('tbody');
  if(!data.length){tb.innerHTML='<tr><td colspan="11"><div class="empty"><i class="ti ti-clipboard-x"></i>Nenhuma multa encontrada</div></td></tr>';return;}
  tb.innerHTML=data.map(m=>{
    const[bc,dotc,bl]=SM[m.status]||['','',''];
    const obs=m.obs||'';
    return`<tr>
      <td><span class="pt">${m.placa}</span></td>
      <td style="white-space:nowrap">${m.motorista||'—'}</td>
      <td style="white-space:nowrap">${m.orgao||'—'}</td>
      <td style="font-family:var(--fm);font-size:11px">${m.auto||'—'}</td>
      <td class="ic" title="${(m.infracao||'').replace(/"/g,'&quot;')}">${m.infracao||'—'}</td>
      <td style="white-space:nowrap;font-weight:500">${fv(m.valor)}</td>
      <td style="white-space:nowrap">${fd(m.vencimento)}</td>
      <td class="${dc(m.prazo,m.status)}">${dl(m.prazo,m.status)}</td>
      <td><span class="badge ${bc}"><span class="dot" style="background:${dotc}"></span>${bl}</span></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--tx2);font-size:11px" title="${obs.replace(/"/g,'&quot;')}">${obs}</td>
      <td><div class="actions">
        <button class="ib" title="Editar" onclick="editM(${m.id})"><i class="ti ti-edit"></i></button>
        <button class="ib" title="Excluir" onclick="delM(${m.id})" style="color:#c0392b"><i class="ti ti-trash"></i></button>
      </div></td>
    </tr>`;
  }).join('');
}
function setTab(t,el){ctab=t;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));el.classList.add('active');render();}
function openModal(m){
  eid=m?m.id:null;
  document.getElementById('mtitle').textContent=m?'Editar multa':'Nova multa';
  document.getElementById('fp').value=m?m.placa:'';
  document.getElementById('fm2').value=m?m.motorista:'';
  document.getElementById('fo2').value=m?m.orgao:'';
  document.getElementById('fau').value=m?(m.auto||''):'';
  document.getElementById('flo').value=m?(m.local||''):'';
  document.getElementById('fin').value=m?(m.infracao||''):'';
  document.getElementById('fv').value=m?m.valor:'';
  document.getElementById('fdt').value=m?m.vencimento:'';
  document.getElementById('fpr').value=m?m.prazo:'';
  document.getElementById('fst').value=m?m.status:'aguardando_motorista';
  document.getElementById('fob').value=m?(m.obs||''):'';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');eid=null;}
function editM(id){const m=multas.find(x=>x.id===id);if(m)openModal(m);}
function delM(id){if(!confirm('Excluir esta multa?'))return;multas=multas.filter(m=>m.id!==id);sv();render();}
function saveMulta(){
  const p=document.getElementById('fp').value.trim().toUpperCase();
  const mo=document.getElementById('fm2').value.trim();
  const o=document.getElementById('fo2').value.trim();
  const val=parseFloat(document.getElementById('fv').value);
  if(!p||!mo||!o||isNaN(val)){alert('Preencha os campos obrigatórios (*).');return;}
  const r={
    id:eid||nid++,placa:p,motorista:mo,orgao:o,
    auto:document.getElementById('fau').value.trim(),
    local:document.getElementById('flo').value.trim(),
    infracao:document.getElementById('fin').value.trim(),
    valor:Math.round(val*100)/100,
    vencimento:document.getElementById('fdt').value,
    prazo:document.getElementById('fpr').value,
    status:document.getElementById('fst').value,
    obs:document.getElementById('fob').value.trim()
  };
  if(eid){const i=multas.findIndex(m=>m.id===eid);if(i>=0)multas[i]=r;}
  else{multas.push(r);}
  sv();closeModal();render();
}
function exportCSV(){
  const SL={aguardando_motorista:'Aguardando motorista',aceito_cdt:'Aceito na CDT',pago:'Pago',vencido:'Vencido',em_analise:'Em análise'};
  const h='Placa,Motorista,Orgão,Auto,Local,Infração,Valor,Data,Prazo RCA,Status,Observações';
  const data=gf();
  const rows=data.map(m=>[m.placa,m.motorista,m.orgao,m.auto||'',m.local||'',m.infracao||'',m.valor,fd(m.vencimento),fd(m.prazo),SL[m.status]||m.status,m.obs||''].map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(','));
  const csv=[h,...rows].join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  const mes=document.getElementById('fmes').value;
  a.download='multas_'+(mes||new Date().toISOString().slice(0,10))+'.csv';
  a.click();
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
lv();render();
</script>
