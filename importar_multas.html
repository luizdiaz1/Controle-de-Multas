<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Importar multas para Supabase</title>
<style>body{font-family:Arial,sans-serif;background:#f8fafc;color:#0f172a;padding:30px}main{max-width:780px;margin:auto;background:white;border:1px solid #e2e8f0;border-radius:18px;padding:24px;box-shadow:0 14px 40px rgba(15,23,42,.08)}button{background:#2563eb;color:white;border:0;border-radius:12px;padding:12px 16px;font-weight:700;cursor:pointer}pre{background:#0f172a;color:#e2e8f0;border-radius:12px;padding:14px;white-space:pre-wrap;max-height:360px;overflow:auto}</style>
</head>
<body>
<main>
<h1>Importar multas para o Supabase</h1>
<p>Use esta página uma única vez, depois de criar a tabela no Supabase.</p>
<p>Ela vai inserir as multas atuais que estavam no seu navegador.</p>
<button onclick="importar()">Importar multas iniciais</button>
<pre id="log">Aguardando...</pre>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="multas-iniciais.js"></script>
<script>
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const log = document.getElementById('log');
function write(msg){ log.textContent += '\n' + msg; }
async function importar(){
  log.textContent = 'Conectando ao Supabase...';
  write('Total para importar: ' + MULTAS_INICIAIS.length);
  const { data: existentes, error: erroConsulta } = await supabaseClient.from('multas').select('id').limit(1);
  if(erroConsulta){ write('ERRO ao consultar: ' + erroConsulta.message); return; }
  if(existentes && existentes.length){
    if(!confirm('A tabela já possui dados. Importar mesmo assim? Registros com o mesmo ID serão atualizados.')) return;
  }
  const lote = 50;
  for(let i=0;i<MULTAS_INICIAIS.length;i+=lote){
    const parte = MULTAS_INICIAIS.slice(i,i+lote);
    const { error } = await supabaseClient.from('multas').upsert(parte, { onConflict: 'id' });
    if(error){ write('ERRO no lote ' + (i/lote+1) + ': ' + error.message); return; }
    write('Importadas/atualizadas: ' + Math.min(i+lote, MULTAS_INICIAIS.length));
  }
  write('Pronto. Agora abra o index.html.');
}
</script>
</body>
</html>
